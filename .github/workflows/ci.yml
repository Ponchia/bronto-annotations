name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Check
        run: npm run check

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-evidence-node-${{ matrix.node-version }}
          path: |
            .tmp/screenshots
            .tmp-packed-screenshots
          if-no-files-found: ignore
