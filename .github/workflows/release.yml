# Release is tag-driven and explicit. It triggers only on a pushed `v*` tag,
# never on a branch push or GitHub Release publication event. The publish job
# is protected by the `npm-publish` environment so a tag cannot reach npm until
# a maintainer approves the deployment in GitHub Actions.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-publish
  cancel-in-progress: false

env:
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '10000'
  npm_config_fetch_retry_maxtimeout: '120000'

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::release tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is not reachable from origin/main"
            exit 1
          fi

      - name: Install
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Check
        run: npm run check

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"
            exit 1
          fi

  publish-preflight:
    name: Publish preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Capture publish preflight summary
        run: |
          set -euo pipefail
          npm pack --dry-run --json --ignore-scripts > "${RUNNER_TEMP}/pack.json"
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const path = require('node:path');
          const pack = JSON.parse(fs.readFileSync(path.join(process.env.RUNNER_TEMP, 'pack.json'), 'utf8'))[0];
          console.log('## Publish preflight');
          console.log('');
          console.log(`Package: ${pack.name}@${pack.version}`);
          console.log(`Files: ${pack.files.length}`);
          console.log(`Packed size: ${pack.size} bytes`);
          console.log(`Unpacked size: ${pack.unpackedSize} bytes`);
          console.log(`Integrity: ${pack.integrity}`);
          console.log('');
          console.log('### Pack manifest');
          console.log('');
          for (const file of pack.files) console.log(`- ${file.path} (${file.size} B)`);
          NODE

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: publish-preflight
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Install npm with OIDC publish support
        run: npm install -g npm@latest

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ "$version" != "${version%%-*}" ]; then
            dist_tag=next
          else
            dist_tag=latest
          fi
          echo "Publishing $version to dist-tag '$dist_tag'"
          npm publish --ignore-scripts --provenance --access public --tag "$dist_tag"

      - name: Record npm registry state
        continue-on-error: true
        run: |
          set -uo pipefail
          version="${GITHUB_REF_NAME#v}"
          view_ok=false
          attempts_remaining=5
          while [ "$attempts_remaining" -gt 0 ]; do
            if npm view "@ponchia/annotations@$version" version dist.integrity dist.tarball --json > "${RUNNER_TEMP}/npm-view.json"; then
              view_ok=true
              break
            fi
            attempts_remaining=$((attempts_remaining - 1))
            sleep 5
          done
          tags_ok=false
          if npm view @ponchia/annotations dist-tags --json > "${RUNNER_TEMP}/npm-dist-tags.json"; then
            tags_ok=true
          fi

          {
            echo ''
            echo '## npm registry state'
            echo ''
            if [ "$view_ok" = true ] && [ "$tags_ok" = true ]; then
              node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const tmp = process.env.RUNNER_TEMP;
          const view = JSON.parse(fs.readFileSync(path.join(tmp, 'npm-view.json'), 'utf8'));
          const tags = JSON.parse(fs.readFileSync(path.join(tmp, 'npm-dist-tags.json'), 'utf8'));
          console.log('```json');
          console.log(JSON.stringify({ published: view, distTags: tags }, null, 2));
          console.log('```');
          NODE
            else
              echo '> npm publish completed, but the post-publish registry observation did not return a complete response.'
              echo ''
              echo "- package lookup: $view_ok"
              echo "- dist-tag lookup: $tags_ok"
              echo ''
              echo "Verify manually with \`npm view @ponchia/annotations version dist-tags --json\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-notes:
    name: Publish GitHub release notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish-npm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract the CHANGELOG section for this tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: node scripts/changelog-section.mjs "$REF_NAME" > "${RUNNER_TEMP}/release-body.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body_path: ${{ runner.temp }}/release-body.md
          prerelease: ${{ contains(github.ref_name, '-') }}
